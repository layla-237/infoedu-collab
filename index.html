<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <title>Inregistrare si autentificare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <nav class="nav">
        <div class="nav-logo">
            <p>Eliceu</p>
        </div>

        <div class="nav-menu" id="navMenu">
            <ul>
                <li><a href="#" class="link active">Pagina principala</a></li>
                <li><a href="#" class="link">Magazin de licee</a></li>
                <li><a href="#" class="link">Profiluri</a></li>
                <li><a href="#" class="link">Info</a></li>
            </ul>
        </div>

        <div class="nav-button">
            <button class="btn white-btn" id="loginBtn"  onclick="login()">Sign In</button>
            <button class="btn" id="registerBtn" onclick="register()">Sign Up</button>
        </div>

        <div class="nav-menu-btn">
            <i class="bx bx-menu" onclick="myMenuFunction()"></i>
        </div>
    </nav>



    <div class="form-box">
 <!--inregistarre-->
        <div class="login-container" id="login">

            <div class="top">
                <span>Nu ai cont?<a href="#" onclick="register()">Sign Up</a></span>
                <header>Login</header>
            </div>

            <!-- Email -->
            <div class="input-box">
                <input type="text" class="input-field" placeholder="Username or Email">
                <i class="bx bx-user"></i>
            </div>

            <!-- Parola -->
            <div class="input-box">
                <input type="password" class="input-field" placeholder="Parola">
                <i class="bx bx-lock-alt"></i>
            </div>

            <!-- Buton -->
            <div class="input-box">
                <input type="submit" class="submit" value="Sign In">
            </div>

            <!-- Checkbox + Termeni -->
            <div class="two-col">

                <div class="one">
                    <input type="checkbox" id="login-check">
                    <label for="login-check">Tine-ma minte</label>
                </div>

                <div class="two">
                    <label><a href="#">Ai uitat parola?</a></label>
                </div>

            </div>

        </div>


        <div class="register-container" id="register">

            <div class="top">
                <span>Ai un cont? <a href="#" onclick="login()">Login</a></span>
                <header>Sign up</header>
            </div>

            <!-- Nume + Prenume -->
            <div class="two-forms">

                <div class="input-box">
                    <input type="text" class="input-field" placeholder="Nume">
                    <i class="bx bx-user"></i>
                </div>

                <div class="input-box">
                    <input type="text" class="input-field" placeholder="Prenume">
                    <i class="bx bx-user"></i>
                </div>

            </div>

            <!-- Email -->
            <div class="input-box">
                <input type="text" class="input-field" placeholder="Email">
                <i class="bx bx-envelope"></i>
            </div>

            <!-- Parola -->
            <div class="input-box">
                <input type="password" class="input-field" placeholder="Parola">
                <i class="bx bx-lock-alt"></i>
            </div>

            <!-- Buton -->
            <div class="input-box">
                <input type="submit" class="submit" value="Register">
            </div>

            <!-- Checkbox + Termeni -->
            <div class="two-col">

                <div class="one">
                    <input type="checkbox" id="register-check">
                    <label for="register-check">Tine-ma minte</label>
                </div>

                <div class="two">
                    <label><a href="#">Termenii si conditiile</a></label>
                </div>

            </div>

        </div>

    </div>

</div>
<script>
    function myMenuFunction(){
        var i=document.getElementById("navMenu");
        if(i.className === "nav-menu"){
            i.className += " responsive";
        } 
        else {
            i.className = "nav-menu";
        }
    }
</script>

<script>
    var a= document.getElementById("loginBtn");
    var b= document.getElementById("registerBtn");
    var x= document.getElementById("login");
    var y= document.getElementById("register");

    function login(){
        x.style.left="4px";
        y.style.right="-520px";
        a.className="btn white-btn";
        b.className="btn";
        x.style.opacity=1;
        y.style.opacity=0;
    }
    
    function register(){
        x.style.left="-510px";
        y.style.right="5px";
        a.className="btn";
        b.className="btn white-btn";
        x.style.opacity=0;
        y.style.opacity=1;
    }

</script>



</body>
</html>
