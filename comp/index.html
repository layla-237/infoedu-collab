<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="products-grid" id="productsGrid">


        <div class="product-card" style="animation-delay: 0.06s">
            <div class="card-badge badge-top">Top 1 BUC</div>
            <button class="fav-btn">🤍</button>


            <div class="card-image-wrap">
                <img src="https://images.unsplash.com/photo-1562774053-701939374585?w=1200&q=80"
                    alt="Colegiul Național „Sfântul Sava”" loading="lazy">
                <div class="card-overlay"></div>
            </div>


            <div class="card-body">
                <div class="card-category">Real · Sector 5</div>
                <div class="card-title">Colegiul Național „Gheorghe Lazăr”</div>
                <div class="card-desc">Tradiție academică de excepție, cu performanțe remarcabile la matematică și
                    informatică. Locul de formare al multor olimpici naționali și internaționali.</div>

                <div class="card-stats">
                    <div class="stat-chip">1,200</div>
                    <div class="stat-chip">34 clase</div>
                </div>

                <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
                    <div style="display:flex;gap:2px">
                        <span style="font-size:12px;color:#f5c518">★</span>
                        <span style="font-size:12px;color:#f5c518">★</span>
                        <span style="font-size:12px;color:#f5c518">★</span>
                        <span style="font-size:12px;color:#f5c518">★</span>
                        <span style="font-size:12px;color:#f5c518">★</span>
                    </div>

                    <span font-size:12px;font-weight:400;color:var(--text-muted)>5 (300)</span>
                </div>

                <div class="card-price-row">
                    <div>
                        <div class="price-unit">Medie admitere</div>
                        <div class="price-main">9.88</div>
                    </div>
                    <div style="display:flex;gap:8px">
                        <button class="add-btn">
                            Compară
                        </button>
                        <button class="add-btn">
                            +
                        </button>
                    </div>
                </div>
            </div>
        </div>






    </div>
</body>

</html>
